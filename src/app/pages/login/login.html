<div class="login-card">

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="14" height="14" rx="3" fill="#f59e0b"/>
        <rect x="22" y="4" width="14" height="14" rx="3" fill="#f59e0b" opacity="0.6"/>
        <rect x="4" y="22" width="14" height="14" rx="3" fill="#f59e0b" opacity="0.6"/>
        <rect x="22" y="22" width="14" height="14" rx="3" fill="#f59e0b" opacity="0.3"/>
      </svg>
    </div>
    <span>MaeRoll</span>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your HR &amp; Payroll dashboard</p>

  <form (ngSubmit)="login()" novalidate>

    <div class="field">
      <label for="email">Email</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
        </span>
        <input id="email" type="email" [(ngModel)]="email" name="email"
          placeholder="you@hotel.co.za" autocomplete="email" [disabled]="loading"/>
      </div>
    </div>

    <div class="field">
      <label for="password">
        Password
        <a routerLink="/forgot-password" class="forgot">Forgot password?</a>
      </label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
          </svg>
        </span>
        <input id="password" [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password" name="password" placeholder="Your password"
          autocomplete="current-password" [disabled]="loading"/>
        <button type="button" class="toggle-pw" (click)="togglePassword()" tabindex="-1">
          <svg *ngIf="!showPassword" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
            <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
          </svg>
          <svg *ngIf="showPassword" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/>
            <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.064 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>
          </svg>
        </button>
      </div>
      <div class="caps-warn" *ngIf="capsLock && password">⚠ Caps Lock is on</div>
    </div>

    <div class="error-box" *ngIf="error">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
      </svg>
      {{ error }}
    </div>

    <div class="warn-box" *ngIf="attemptsWarning">⚠ {{ attemptsWarning }}</div>

    <button type="submit" class="submit-btn" [disabled]="loading">
      <span *ngIf="!loading">Login</span>
      <span *ngIf="loading" class="loading-state">
        <span class="spinner"></span> Signing in...
      </span>
    </button>

  </form>

  <div class="signup-hint">
    New hotel? <a routerLink="/signup">Get started with a license key →</a>
  </div>

</div>
