<div class="auth-wrapper">
  <div class="bg-mesh"></div>
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon">HR</div>
      <span class="brand-name">MaeRoll</span>
    </div>

    <div *ngIf="!submitted">
      <h1 class="auth-title">Forgot Password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" class="form-input" placeholder="you@hotel.co.za"
          (keyup.enter)="submit()" [class.error]="error" />
      </div>

      <div class="form-error" *ngIf="error">{{ error }}</div>

      <button class="btn-primary" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </div>

    <div *ngIf="submitted" class="success-state">
      <div class="success-icon">✉️</div>
      <h2>Check your email</h2>
      <p>If an account exists for <strong>{{ email }}</strong>, a reset link has been sent. Check your inbox (and spam folder).</p>
    </div>

    <div class="auth-footer">
      <a class="back-link" (click)="goToLogin()">← Back to login</a>
    </div>
  </div>
</div>
